name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  git-hygiene:
    name: Git history (no Cursor co-author)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Cursor co-author trailers (REQ-GIT-001)
        run: |
          chmod +x .scripts/check-no-cursor-coauthor.sh
          ./.scripts/check-no-cursor-coauthor.sh HEAD

  test:
    name: PHP ${{ matrix.php }} - Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        symfony: ['7.0', '7.4', '8.0', '8.1']
        exclude:
          - php: '8.2'
            symfony: '8.0'
          - php: '8.2'
            symfony: '8.1'
          - php: '8.3'
            symfony: '8.0'
          - php: '8.3'
            symfony: '8.1'

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, zip
          coverage: pcov
          tools: composer:v2

      - run: composer validate --strict

      - name: Install dependencies
        run: |
          composer require \
            symfony/config:^${{ matrix.symfony }} \
            symfony/dependency-injection:^${{ matrix.symfony }} \
            symfony/framework-bundle:^${{ matrix.symfony }} \
            symfony/http-foundation:^${{ matrix.symfony }} \
            symfony/http-kernel:^${{ matrix.symfony }} \
            symfony/routing:^${{ matrix.symfony }} \
            symfony/twig-bundle:^${{ matrix.symfony }} \
            symfony/yaml:^${{ matrix.symfony }} \
            --no-interaction --no-update
          composer require --dev \
            symfony/browser-kit:^${{ matrix.symfony }} \
            symfony/phpunit-bridge:^${{ matrix.symfony }} \
            --no-interaction --no-update
          composer update --no-interaction --prefer-dist

      - run: composer test

      - if: matrix.php == '8.2' && matrix.symfony == '7.4'
        run: composer test-coverage

  cs-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - run: composer update --no-interaction --prefer-dist --no-progress
      - run: composer cs-check

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: json, zip
          coverage: pcov
          tools: composer:v2
      - run: composer update --no-interaction --prefer-dist
      - name: Run tests with coverage
        run: |
          composer test-coverage
          METRICS_LINE=$(grep '<metrics files=' coverage.xml)
          STATEMENTS=$(echo "$METRICS_LINE" | awk -F'statements="' '{print $2}' | awk -F'"' '{print $1}')
          COVERED=$(echo "$METRICS_LINE" | awk -F'coveredstatements="' '{print $2}' | awk -F'"' '{print $1}')
          COVERAGE_PERCENT=$(echo "scale=2; ($COVERED / $STATEMENTS) * 100" | bc | cut -d. -f1)
          echo "Code coverage: ${COVERAGE_PERCENT}%"
          MIN_COVERAGE=75
          if [ "$COVERAGE_PERCENT" -lt "$MIN_COVERAGE" ]; then
            echo "ERROR: Code coverage is ${COVERAGE_PERCENT}%, expected at least ${MIN_COVERAGE}%"
            exit 1
          fi

