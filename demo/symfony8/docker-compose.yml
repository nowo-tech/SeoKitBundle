name: seo-kit-bundle-demo-symfony-8

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seo-kit-demo-symfony8-php
    working_dir: /app
    ports:
      - "${PORT:-8050}:80"
    volumes:
      - .:/app
      - ../../:/var/seo-kit-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=${APP_SECRET:-demo-secret}
      - DEFAULT_URI=http://localhost:${PORT:-8050}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - seo-kit-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  seo-kit-demo-network:
    driver: bridge
