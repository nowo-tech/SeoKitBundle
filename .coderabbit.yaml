# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for nowo-tech/SeoKitBundle.
# Requires the CodeRabbit GitHub App installed on nowo-tech/SeoKitBundle.
# Manual review: comment `@coderabbitai review` on a pull request.

language: en-US

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  commit_status: true
  poem: false
  collapse_walkthrough: true
  sequence_diagrams: true
  changed_files_summary: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 10
    drafts: false
    base_branches:
      - main
      - master
    ignore_title_keywords:
      - WIP
      - "[skip review]"

  path_filters:
    - "!**/vendor/**"
    - "!**/coverage/**"
    - "!**/*.lock"
    - "!phpstan-baseline.neon"
    - "!.cursor/**"
    - "src/**"
    - "tests/**"
    - "docs/**"
    - "demo/**"
    - ".github/**"
    - "*.md"
    - "*.yaml"
    - "*.yml"
    - "Makefile"

  path_instructions:
    - path: "src/**/*.php"
      instructions: |
        nowo-tech/seo-kit-bundle — Symfony SEO kit: multilingual routes, slug layers, head tags, hreflang, sitemap, robots.
        Follow PSR-12 and `.php-cs-fixer.dist.php`. Prefer PHP 8 attributes over annotations.
        Respect PHP and Symfony ranges in `composer.json`. Preserve backward compatibility unless the PR explicitly breaks it.
        Align with `composer cs-check`, `composer phpstan`, and `composer test`.

    - path: "tests/**/*.php"
      instructions: |
        PHPUnit tests for this package. Add or update tests for new behaviour.
        Match existing test structure (Unit vs Integration). Avoid trivial assertions.

    - path: "docs/**/*.md"
      instructions: |
        User-facing documentation in English under `docs/`. Do not invent features, versions, or commands.
        For notable releases, keep CHANGELOG and UPGRADING aligned.

    - path: "demo/**"
      instructions: |
        FrankenPHP demo apps. Keep path repository wiring and PORT from .env.example consistent.

    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions workflows. Match existing workflow style. Do not echo secrets.

  tools:
    phpstan:
      enabled: true
    phpcs:
      enabled: false
    yamllint:
      enabled: true
    hadolint:
      enabled: true
    gitleaks:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 900000
    actionlint:
      enabled: true

knowledge_base:
  learnings:
    scope: auto
  pull_requests:
    scope: auto
